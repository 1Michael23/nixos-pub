keys:
  - &framework age18ag8f0p8q4cuhl8utvwzpgk6f563hrcz5gzmdpsm67gkk2chqgeqrf2au3
  - &mbp age10aya2d46mknkl7d2dm6cy9zpq43sjes4nsjz744gnvhdm8hpme8sf66mc5
  - &admin age18ag8f0p8q4cuhl8utvwzpgk6f563hrcz5gzmdpsm67gkk2chqgeqrf2au3 

creation_rules:
  # secrets that all machines need
  - path_regex: ^secrets/common\.yaml$
    key_groups:
      - age:
          - *framework
          - *mbp
          - *admin

  # secrets only the framework needs
  - path_regex: ^secrets/framework\.yaml$
    key_groups:
      - age:
          - *framework
          - *admin

  # secrets only the mac needs
  - path_regex: ^secrets/mbp\.yaml$
    key_groups:
      - age:
          - *mbp
          - *admin